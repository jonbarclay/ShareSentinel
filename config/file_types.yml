excluded_extensions:
  # Video
  - .mp4
  - .mov
  - .avi
  - .mkv
  - .wmv
  - .flv
  - .webm
  - .m4v
  # Audio
  - .mp3
  - .wav
  - .m4a
  - .aac
  - .flac
  - .ogg
  - .wma
  # Binary/Executable
  - .exe
  - .dll
  - .bin
  - .msi
  - .app
  - .dmg
  # Database
  - .mdb
  - .accdb
  - .sqlite
  - .db
  # Design
  - .psd
  - .ai
  - .sketch
  - .fig
  # 3D/CAD
  - .dwg
  - .dxf
  - .stl
  - .obj
  # Font
  - .ttf
  - .otf
  - .woff

archive_extensions:
  - .zip
  - .rar
  - .7z
  - .tar
  - .gz
  - .tar.gz
  - .tgz

image_extensions:
  - .png
  - .jpg
  - .jpeg
  - .tiff
  - .tif
  - .bmp
  - .gif
  - .webp
  - .heic

text_extractable_extensions:
  pdf: pdf_extractor
  docx: docx_extractor
  doc: docx_extractor
  xlsx: xlsx_extractor
  xls: xlsx_extractor
  pptx: pptx_extractor
  ppt: pptx_extractor
  csv: csv_extractor
  tsv: csv_extractor
  txt: text_extractor
  log: text_extractor
  md: text_extractor
  json: text_extractor
  xml: text_extractor
  html: text_extractor
  htm: text_extractor
  rtf: text_extractor

