  - "ssn"
  - "w-?2"
  - "tax"
  - "passport"
  - "salary"
  - "confidential"
  - "medical"
  - "hipaa"
  - "ferpa"
  - "grades"
  - "transcript"
  - "disciplin"
  - "social.?security"
  - "driver.?licen"
  - "birth.?cert"
  - "routing.?number"
  - "account.?number"
  - "secret"
  - "password"
  - "credential"
